<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Unearned Bounty Idle Mobile and Desktop Wireframe</title>
  <desc id="desc">Rough UI layout for portrait mobile and desktop.</desc>
  <rect width="1200" height="760" fill="#101216"/>
  <text x="48" y="56" fill="#E8D8B8" font-family="Arial, sans-serif" font-size="34" font-weight="700">Main Screen Layout Direction</text>
  <text x="48" y="90" fill="#CDD9D9" font-family="Arial, sans-serif" font-size="18">Portrait first: living sea lane on top, captain's desk controls below. Desktop expands into a three-column desk.</text>

  <g font-family="Arial, sans-serif" font-size="16">
    <text x="126" y="136" fill="#F2B134" font-size="22" font-weight="700">Portrait Mobile</text>
    <rect x="80" y="160" width="360" height="560" rx="28" fill="#172033" stroke="#CDD9D9" stroke-width="3"/>
    <rect x="106" y="192" width="308" height="206" rx="10" fill="#0F3442" stroke="#22A6A1" stroke-width="2"/>
    <text x="132" y="226" fill="#E8D8B8" font-weight="700">Sea Lane View</text>
    <text x="132" y="254" fill="#CDD9D9">ship, enemy, VFX</text>
    <text x="132" y="282" fill="#CDD9D9">lane strip, boss marker</text>
    <path d="M136 342 C184 314 238 374 306 332 C344 308 372 320 392 300" fill="none" stroke="#69D2E7" stroke-width="4" opacity="0.75"/>

    <rect x="106" y="410" width="308" height="66" rx="8" fill="#101216" stroke="#B96E35" stroke-width="2"/>
    <text x="128" y="438" fill="#E8D8B8" font-weight="700">Status Strip</text>
    <text x="128" y="464" fill="#CDD9D9">hull, bearing, active contract</text>

    <rect x="106" y="488" width="308" height="154" rx="8" fill="#172033" stroke="#B96E35" stroke-width="2"/>
    <text x="128" y="518" fill="#E8D8B8" font-weight="700">Active Tab Content</text>
    <text x="128" y="546" fill="#CDD9D9">Arsenal / Relics / Contracts</text>
    <rect x="128" y="570" width="264" height="18" rx="4" fill="#0F3442"/>
    <rect x="128" y="600" width="218" height="18" rx="4" fill="#0F3442"/>

    <rect x="106" y="654" width="308" height="46" rx="8" fill="#101216" stroke="#CDD9D9" stroke-width="1.5"/>
    <text x="128" y="684" fill="#E8D8B8">Tab Bar: Arsenal Bearing Relics</text>

    <text x="608" y="136" fill="#F2B134" font-size="22" font-weight="700">Desktop / Tablet</text>
    <rect x="540" y="160" width="580" height="420" rx="14" fill="#172033" stroke="#CDD9D9" stroke-width="3"/>

    <rect x="562" y="186" width="118" height="366" rx="8" fill="#101216" stroke="#B96E35" stroke-width="2"/>
    <text x="582" y="218" fill="#E8D8B8" font-weight="700">Tab Rail</text>
    <text x="582" y="248" fill="#CDD9D9">icons</text>
    <text x="582" y="276" fill="#CDD9D9">resources</text>

    <rect x="700" y="186" width="266" height="178" rx="8" fill="#0F3442" stroke="#22A6A1" stroke-width="2"/>
    <text x="724" y="220" fill="#E8D8B8" font-weight="700">Sea Lane View</text>
    <path d="M726 310 C770 280 828 332 884 302 C918 284 940 292 956 274" fill="none" stroke="#69D2E7" stroke-width="4" opacity="0.75"/>

    <rect x="700" y="382" width="266" height="170" rx="8" fill="#172033" stroke="#B96E35" stroke-width="2"/>
    <text x="724" y="416" fill="#E8D8B8" font-weight="700">System Panel</text>
    <text x="724" y="446" fill="#CDD9D9">selected tab details</text>
    <rect x="724" y="470" width="210" height="18" rx="4" fill="#0F3442"/>
    <rect x="724" y="500" width="170" height="18" rx="4" fill="#0F3442"/>

    <rect x="986" y="186" width="112" height="366" rx="8" fill="#101216" stroke="#B96E35" stroke-width="2"/>
    <text x="1004" y="218" fill="#E8D8B8" font-weight="700">Intel</text>
    <text x="1004" y="248" fill="#CDD9D9">lane</text>
    <text x="1004" y="276" fill="#CDD9D9">contracts</text>
    <text x="1004" y="304" fill="#CDD9D9">next</text>
    <text x="1004" y="332" fill="#CDD9D9">unlock</text>
  </g>
</svg>

